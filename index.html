<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <div class="gallery">

        <img src="https://picsum.photos/id/1015/300/200" class="gallery-img">

        <img src="https://picsum.photos/id/1016/300/200" class="gallery-img">

        <img src="https://picsum.photos/id/1018/300/200" class="gallery-img">

        <img src="https://picsum.photos/id/1020/300/200" class="gallery-img">

    </div>

    <div class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-img">
        <button class="prev">Prev</button>
        <button class="next">Next</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
